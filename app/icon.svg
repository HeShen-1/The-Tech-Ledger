<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- White background -->
  <rect width="32" height="32" fill="#F9F9F7"/>
  <!-- Top red accent bar (masthead) -->
  <rect x="0" y="0" width="32" height="3" fill="#CC0000"/>
  <!-- Newsprint text lines -->
  <rect x="3" y="8"  width="26" height="2" fill="#111111" opacity="0.9"/>
  <rect x="3" y="13" width="20" height="2" fill="#111111" opacity="0.7"/>
  <rect x="3" y="18" width="24" height="2" fill="#111111" opacity="0.5"/>
  <rect x="3" y="23" width="15" height="2" fill="#111111" opacity="0.3"/>
  <!-- Bottom red accent -->
  <rect x="3" y="28" width="10" height="2" fill="#CC0000"/>
</svg>
